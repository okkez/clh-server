services:
  db:
    image: postgres:18
    restart: always
    volumes:
      - ./db-data18:/var/lib/postgresql
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    env_file:
      - db.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clh"]
      interval: 5s
      timeout: 5s
      retries: 5

  clh:
    build:
      context: .
      dockerfile: Dockerfile
    links:
      - db
    depends_on:
      db:
        condition: service_healthy
    env_file:
      clh.env
    ports:
      - "8088:8088"
    command: ["/app/clh-server"]

  test:
    build:
      context: .
      target: build
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
    links:
      - db
    depends_on:
      db:
        condition: service_healthy
    env_file:
      clh.env
    command: ["bash", "-c", "/app/setup-db.sh && cargo test -- --no-capture"]
